<!-- 
Crypto Challenge: Decode

Description: This challenge involves decoding an encoded message to find the flag. 
The user must recognize that the text is Base64 and decode it correctly. 
It introduces basic cryptography concepts used in cybersecurity.
-->

<!DOCTYPE html>
<html>
<head>
    <title>CTF Challenge 2 - Crypto</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #4caf50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🧩 Crypto Challenge</h1>
<p>Decode this Base64 message:</p>

<p><b>ZmxhZ3t5b3VfZGVjb2RlZF9pdH0=</b></p>

<input type="text" id="answer" placeholder="Enter decoded flag">
<button onclick="checkAnswer()">Submit</button>

<p id="result"></p>

<script>
function checkAnswer() {
    var input = document.getElementById("answer").value;

    if(input === "flag{you_decoded_it}") {
        document.getElementById("result").innerHTML = "🎉 Correct!";
    } else {
        document.getElementById("result").innerHTML = "❌ Try again!";
    }
}
</script>

</body>
</html>
